name: Lint and Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: actions/cache@v2
        with:
          node-version: 22

      - run: npm install
      - run: npm run lint
      - run: npm test
